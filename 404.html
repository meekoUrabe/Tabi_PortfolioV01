<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>TABI_OS_v1.0 | 404_NOT_FOUND</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: var(--color-background);
      color: var(--color-on-background);
      overflow: hidden;
    }

    .error-container {
      position: relative;
      width: 100%;
      max-width: 640px;
      margin: var(--spacing-margin-mobile);
      padding: 40px;
      background-color: var(--color-surface);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
      z-index: 10;
    }

    .error-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 16px;
      margin-bottom: 24px;
    }

    .error-title {
      font-family: var(--font-mono);
      font-size: var(--fs-terminal-sm);
      letter-spacing: var(--ls-terminal-sm);
      color: #ffb4ab; /* error color */
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .error-body {
      font-family: var(--font-display);
      font-size: var(--fs-headline-md);
      font-weight: var(--fw-headline-md);
      margin-bottom: 16px;
      color: #ffffff;
      animation: crt-flicker 10s infinite;
    }

    .error-log {
      font-family: var(--font-mono);
      font-size: var(--fs-terminal-sm);
      line-height: 1.8;
      background-color: var(--color-surface-container-lowest);
      padding: 16px;
      border-left: 2px solid #ffb4ab;
      margin-bottom: 32px;
      min-height: 160px;
      color: var(--color-on-surface-variant);
    }

    .error-btn {
      font-family: var(--font-mono);
      font-size: var(--fs-terminal-sm);
      color: #000000;
      background-color: #ffffff;
      border: 1px solid #ffffff;
      padding: 12px 24px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: background-color 300ms ease, color 300ms ease, box-shadow 300ms ease;
      text-decoration: none;
    }

    .error-btn:hover {
      background-color: transparent;
      color: #ffffff;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.8);
    }
  </style>
</head>
<body class="grid-lines">
  <div class="hero-scanlines" aria-hidden="true"></div>

  <div class="error-container chamfer-card">
    <div class="error-header">
      <div class="error-title">
        <span class="material-symbols-outlined" style="font-size: 16px;">error</span>
        SYSTEM_FAILURE_0x404
      </div>
      <div style="font-family: var(--font-mono); font-size: 10px; opacity: 0.3;">TABI_OS_v1.0</div>
    </div>

    <h1 class="error-body">UPLINK_BROKEN</h1>
    
    <div class="error-log" id="diag-log">
      <div id="diag-text"></div>
      <span class="underscore-blink"></span>
    </div>

    <a class="error-btn" href="index.html">
      RETURN_TO_BASE
      <span class="material-symbols-outlined" style="font-size: 16px;">keyboard_return</span>
    </a>
  </div>

  <script>
    const consoleLog = [
      "> INITIATING DIAGNOSTIC SEQUENCE...",
      "> LOCATING SYSTEM PACKET...",
      "> WARNING: TARGET PORTFOLIO PATH NOT FOUND",
      "> STATUS CODE: 404_PAGE_NOT_FOUND",
      "> UPLINK TERMINATED SAFELY."
    ];

    const diagText = document.getElementById('diag-text');
    let currentLine = 0;
    let currentChar = 0;

    function typeDiag() {
      if (currentLine < consoleLog.length) {
        const line = consoleLog[currentLine];
        if (currentChar < line.length) {
          diagText.innerHTML += line.charAt(currentChar);
          currentChar++;
          setTimeout(typeDiag, 30);
        } else {
          diagText.innerHTML += "<br/>";
          currentLine++;
          currentChar = 0;
          setTimeout(typeDiag, 300);
        }
      }
    }

    window.addEventListener('load', () => {
      setTimeout(typeDiag, 400);
    });
  </script>
</body>
</html>
